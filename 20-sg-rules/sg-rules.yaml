bastion :
- name : bastion_internet  #bastion accepting connections from internet
  port : 22
  src  : internet
  dest : bastion

mongodb :
- name : mongodb_bastion  #mongodb accepting connections from bastion  
  port : 22
  src  : bastion
  dest : mongodb
- name : mongodb_catalogue  #mongodb accepting connections from catalogue   
  port : 27017
  src  : catalogue
  dest : mongodb
- name : mongodb_user
  port : 27017
  src  : user
  dest : mongodb  

redis:
- name : redis_bastion
  port : 22
  src  : bastion
  dest : redis

mysql:
- name : mysql_bastion
  port : 22
  src  : bastion
  dest : mysql
   
rabbitmq :
- name : rabbitmq_bastion
  port : 22
  src  : bastion
  dest : rabbitmq   